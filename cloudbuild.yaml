# Builds the backend image from the repo ROOT context (so documents/ ships in the
# image, matching backend/Dockerfile's COPY layout) using backend/Dockerfile.
# Invoked by deploy-gcp.sh via: gcloud builds submit --config cloudbuild.yaml --substitutions _IMAGE=...
steps:
  - name: gcr.io/cloud-builders/docker
    args: ['build', '-t', '${_IMAGE}', '-f', 'backend/Dockerfile', '.']
images:
  - '${_IMAGE}'
options:
  # Bigger builder: the CPU-only torch + sentence-transformers install is heavy.
  machineType: 'E2_HIGHCPU_8'
timeout: 1800s
