# Backend now runs on DigitalOcean App Platform (see .do/app.yaml) - Render's Python
# free tier couldn't fit the embedding + reranker models in 512MB. This file only
# hosts the frontend static site now.
services:
  - type: web
    name: rag-frontend
    runtime: static
    branch: main
    rootDir: frontend
    buildCommand: npm install && node node_modules/vite/bin/vite.js build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://gic-backend-8tdqd.ondigitalocean.app
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
