name: gic-backend
region: nyc
services:
  - name: backend
    github:
      repo: AHMEDzayn-ux/GIC-Public-care
      branch: main
      deploy_on_push: true
    # Root context (not source_dir: backend) so documents/gic/ ships in the image -
    # see comment in backend/Dockerfile.
    dockerfile_path: backend/Dockerfile
    http_port: 8080
    # basic-xs (1GB) OOM-killed the container while loading the embedding model
    # during boot-time ingestion (scripts/ingest_gic.py runs before uvicorn starts,
    # see Dockerfile CMD) - basic-s matches what nexus-backend already runs on.
    instance_size_slug: basic-s
    instance_count: 1
    health_check:
      # Boot-time ingestion (embedding model load + indexing all GIC docs) takes
      # longer than the default readiness-probe window, which caused DO to kill
      # the container as unhealthy and auto-rollback before ingestion finished.
      initial_delay_seconds: 300
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: ENVIRONMENT
        value: production
        scope: RUN_TIME
      - key: LOG_LEVEL
        value: INFO
        scope: RUN_TIME
      - key: USE_RERANKING
        value: "false" # re-evaluate now that the instance has 2GB, but embedding + reranker together still hasn't been tested here
        scope: RUN_TIME
      - key: GROQ_API_KEY
        type: SECRET
        scope: RUN_TIME
      - key: GOOGLE_API_KEY
        type: SECRET
        scope: RUN_TIME
      - key: JWT_SECRET
        type: SECRET
        scope: RUN_TIME
      - key: ADMIN_EMAIL
        type: SECRET
        scope: RUN_TIME
      - key: ADMIN_PASSWORD
        type: SECRET
        scope: RUN_TIME
